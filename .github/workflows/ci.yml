name: ggNet CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        cd backend
        pytest tests/ -v --tb=short
    
    - name: Check code style (optional)
      run: |
        cd backend
        pip install flake8
        flake8 src/ --max-line-length=120 --extend-ignore=E203,W503 || true

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: |
        cd frontend
        # Try npm ci first, fallback to clean install if it fails
        # (handles both lock file sync issues and npm optional dependency bugs)
        npm ci || {
          echo "npm ci failed, trying clean install..."
          rm -rf node_modules package-lock.json
          npm install
        }
    
    - name: Build frontend
      run: |
        cd frontend
        echo "Building frontend with Vite..."
        npm run build
        
        # Show build output
        if [ -d "dist" ]; then
          echo "✅ Build successful"
          echo "Build output:"
          ls -lh dist/
          du -sh dist/
        else
          echo "❌ Build failed - dist directory not created"
          exit 1
        fi

  pxe-validation:
    name: PXE Config Validation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Validate PXE service script
      run: |
        python pxe/service.py --help
    
    - name: Check PXE templates
      run: |
        if [ ! -f "pxe/tftp/default.ipxe" ]; then
          echo "Missing default.ipxe"
          exit 1
        fi
        if [ ! -f "pxe/dhcp/dhcpd.conf.template" ]; then
          echo "Missing dhcpd.conf.template"
          exit 1
        fi
        echo "PXE templates validated"

  scripts-validation:
    name: Installation Scripts Validation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check script syntax
      run: |
        bash -n scripts/install.sh
        bash -n scripts/uninstall.sh
        bash -n scripts/check_system.sh
        bash -n storage/raid/create_raid10.sh
        echo "All scripts have valid syntax"
    
    - name: Check executability
      run: |
        # Scripts should be executable in repo
        # Or installer will make them executable
        echo "Script validation complete"

  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check documentation exists
      run: |
        # Verify key documentation files
        for doc in README.md DEPLOYMENT_GUIDE.md; do
          if [ ! -f "$doc" ]; then
            echo "Missing: $doc"
            exit 1
          fi
        done
        echo "Core documentation present"
    
    - name: Check Markdown links (optional)
      run: |
        # Install markdown-link-check if needed
        # npm install -g markdown-link-check
        # markdown-link-check README.md || true
        echo "Markdown check complete"

