global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ggrock-cluster'
    replica: '0'

scrape_configs:
  # Self monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # GGRock API metrics (if available)
  - job_name: 'ggrock-api'
    static_configs:
      - targets: ['ggrock-api:5000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Node exporter for system metrics (if deployed)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

